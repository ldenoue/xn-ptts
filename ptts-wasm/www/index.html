<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pocket TTS - WebAssembly Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; background: #111; color: #ddd; }
  h1 { margin-bottom: 8px; color: #eee; }
  .subtitle { color: #888; margin-bottom: 24px; }
  .subtitle a { color: #60a5fa; }
  .section { margin-bottom: 20px; }
  label { display: block; font-weight: 600; margin-bottom: 6px; color: #ccc; }
  select, textarea, button { font-family: inherit; font-size: 14px; }
  select { padding: 6px 10px; border: 1px solid #444; border-radius: 4px; background: #222; color: #ddd; }
  textarea { width: 100%; padding: 10px; border: 1px solid #444; border-radius: 4px; resize: vertical; background: #1a1a1a; color: #ddd; }
  button { padding: 10px 24px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
  button:hover:not(:disabled) { background: #1d4ed8; }
  #status { margin-top: 12px; padding: 10px; background: #1a1a2e; border: 1px solid #333; border-radius: 4px; font-size: 13px; white-space: pre-wrap; color: #aaa; }
  .progress-bar { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 6px; overflow: hidden; }
  .progress-bar .fill { height: 100%; background: #2563eb; transition: width 0.2s; }
  audio { width: 100%; margin-top: 12px; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: end; }
  .controls .section { margin-bottom: 0; }
  .secondary-btn { background: #374151; }
  .secondary-btn:hover:not(:disabled) { background: #4b5563; }
  #visualizer { width: 100%; height: 140px; margin-top: 16px; display: block; }
  .slider-section { margin-bottom: 0; margin-left: auto; }
  .slider-section label { display: block; font-weight: 600; margin-bottom: 6px; color: #ccc; }
  .slider-section input[type="range"] { width: 120px; vertical-align: middle; }
  .slider-section .slider-value { color: #aaa; font-size: 14px; margin-left: 4px; }
</style>
</head>
<body>

<p class="subtitle"><a href="https://github.com/kyutai-labs/pocket-tts" target="_blank"> Pocket TTS</a> running in the browser via WebAssembly using <a href="https://github.com/LaurentMazare/xn" target="_blank">LaurentMazare/xn</a>, <a href="https://github.com/idle-intelligence/tts-web" target="_blank">idle-intelligence/tts-web</a>, or <a href="https://huggingface.co/Supertone/supertonic-3" target="_blank">Supertonic 3</a></p>

<div class="section">
  <label for="text">Text to speak</label>
  <textarea id="text" rows="3">This is a test for the pocket text to speech system, showing great audio with only 100 million parameters.</textarea>
</div>

<div class="controls">
  <div class="section">
    <label for="engine">Engine</label>
    <select id="engine">
      <option value="xn" selected>xn GGUF q8/f32</option>
      <option value="idle">Candle Q8_0 (128 MiB)</option>
      <option value="supertonic">Supertonic 3 ORT</option>
    </select>
  </div>
  <div class="section">
    <label for="voice">Voice</label>
    <select id="voice">
      <option value="alba" selected>Alba</option>
      <option value="marius">Marius</option>
      <option value="javert">Javert</option>
      <option value="fantine">Fantine</option>
      <option value="cosette">Cosette</option>
      <option value="eponine">Eponine</option>
      <option value="azelma">Azelma</option>
    </select>
  </div>
  <div class="section">
    <label for="quant">Quantization</label>
    <select id="quant">
      <option value="f32">f32</option>
      <option value="q8" selected>q8</option>
    </select>
  </div>
  <div class="section" id="language-section" style="display:none">
    <label for="language">Language</label>
    <select id="language">
      <option value="ar" selected>Arabic</option>
      <option value="en">English</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="pt">Portuguese</option>
      <option value="it">Italian</option>
      <option value="es">Spanish</option>
    </select>
  </div>
  <div class="section" id="steps-section" style="display:none">
    <label for="steps">Steps</label>
    <select id="steps">
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
      <option value="5" selected>5</option>
      <option value="6">6</option>
      <option value="8">8</option>
      <option value="10">10</option>
    </select>
  </div>
  <button id="load-btn">Load Weights (146MB)</button>
  <button id="clear-cache-btn" class="secondary-btn">Clear Cache</button>
  <button id="generate-btn" style="display:none">Generate</button>
  <div class="slider-section">
    <label for="temperature">Temperature <span id="temp-value" class="slider-value">0.7</span></label>
    <input type="range" id="temperature" min="0.1" max="1.0" step="0.1" value="0.7">
  </div>
</div>

<div class="progress-bar" id="progress-bar" style="display:none"><div class="fill" id="progress-fill"></div></div>
<div id="status"></div>
<canvas id="visualizer"></canvas>
<div id="audio-container"></div>

<script type="module">
const statusEl = document.getElementById('status');
const loadBtn = document.getElementById('load-btn');
const clearCacheBtn = document.getElementById('clear-cache-btn');
const btn = document.getElementById('generate-btn');
const engineSelect = document.getElementById('engine');
const voiceSelect = document.getElementById('voice');
const quantSelect = document.getElementById('quant');
const languageSection = document.getElementById('language-section');
const languageSelect = document.getElementById('language');
const stepsSection = document.getElementById('steps-section');
const stepsSelect = document.getElementById('steps');
const progressBar = document.getElementById('progress-bar');
const progressFill = document.getElementById('progress-fill');
const canvas = document.getElementById('visualizer');
const canvasCtx = canvas.getContext('2d');
const tempSlider = document.getElementById('temperature');
const tempValue = document.getElementById('temp-value');
const textInput = document.getElementById('text');

tempSlider.addEventListener('input', () => {
  tempValue.textContent = tempSlider.value;
});

const ENGINE_INFO = {
  xn: {
    worker: 'worker.js?v=simd128-no-relaxed-simd',
    type: 'module',
    modelSizeMb: { f32: 240, q8: 146 },
    voiceSizeMb: 46,
    voices: ['alba', 'marius', 'javert', 'fantine', 'cosette', 'eponine', 'azelma'],
  },
  idle: {
    worker: 'idle_worker.js?v=idle-candle-q8',
    type: 'module',
    modelSizeMb: { q8: 134 },
    voiceSizeMb: 43,
    voices: ['alba', 'marius', 'javert', 'fantine', 'cosette', 'eponine', 'azelma'],
  },
  supertonic: {
    worker: 'supertonic_ort_worker.js?v=supertonic3&backend=wasm',
    type: 'classic',
    modelSizeMb: { q8: 401 },
    voiceSizeMb: 0,
    voices: ['F1', 'F2', 'F3', 'F4', 'F5', 'M1', 'M2', 'M3', 'M4', 'M5'],
  },
};

const SAMPLE_TEXT = {
  en: 'This is a test for the pocket text to speech system, showing great audio with only 100 million parameters.',
  ar: 'هذا اختبار لنظام تحويل النص إلى كلام، يوضح جودة صوت رائعة باستخدام مئة مليون معامل فقط.',
  fr: 'Ceci est un test du système de synthèse vocale, qui montre un son excellent avec seulement cent millions de paramètres.',
  de: 'Dies ist ein Test des Text-zu-Sprache-Systems und zeigt großartigen Klang mit nur hundert Millionen Parametern.',
  pt: 'Este é um teste do sistema de conversão de texto em fala, mostrando áudio excelente com apenas cem milhões de parâmetros.',
  it: 'Questo è un test del sistema di sintesi vocale, che mostra un audio eccellente con solo cento milioni di parametri.',
  es: 'Esta es una prueba del sistema de texto a voz, que muestra un audio excelente con solo cien millones de parámetros.',
};

function isSampleText(value) {
  return Object.values(SAMPLE_TEXT).includes(value.trim());
}

function maybeUpdateSampleText() {
  if (!isSampleText(textInput.value)) return;
  const lang = engineSelect.value === 'supertonic' ? languageSelect.value : 'en';
  textInput.value = SAMPLE_TEXT[lang] || SAMPLE_TEXT.en;
}

function updateLoadBtnLabel() {
  const engine = ENGINE_INFO[engineSelect.value] ?? ENGINE_INFO.xn;
  const quant = engineSelect.value === 'xn' ? quantSelect.value : 'q8';
  const modelSize = engine.modelSizeMb[quant] ?? engine.modelSizeMb.q8;
  const totalSize = engine.voiceSizeMb > 0 ? modelSize + engine.voiceSizeMb : modelSize;
  loadBtn.textContent = `Load Weights${engine.voiceSizeMb > 0 ? ' + Voices' : ''} (${totalSize}MB)`;
}

function titleCase(value) {
  return value.slice(0, 1).toUpperCase() + value.slice(1);
}

function updateVoiceOptions() {
  const engine = ENGINE_INFO[engineSelect.value] ?? ENGINE_INFO.xn;
  voiceSelect.replaceChildren(...engine.voices.map((voice) => {
    const option = document.createElement('option');
    option.value = voice;
    option.textContent = /^[FM]\d$/.test(voice) ? voice : titleCase(voice);
    if (voice === (engineSelect.value === 'supertonic' ? 'F5' : 'alba')) option.selected = true;
    return option;
  }));
}
engineSelect.addEventListener('change', () => {
  updateVoiceOptions();
  resetWorkerForEngine();
  updateLoadBtnLabel();
  maybeUpdateSampleText();
});
languageSelect.addEventListener('change', maybeUpdateSampleText);
quantSelect.addEventListener('change', updateLoadBtnLabel);
updateLoadBtnLabel();

function log(msg) {
  statusEl.textContent = msg;
  console.log(msg);
}

function showProgress(pct) {
  progressBar.style.display = 'block';
  progressFill.style.width = pct + '%';
}

function hideProgress() {
  progressBar.style.display = 'none';
}

// ---- Visualizer ----
let analyser = null;
let animFrameId = null;

const BAR_COUNT = 32;
const SEG_COUNT = 16;
const SEG_GAP = 2;

function resizeCanvas() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function segmentColor(segIndex, totalSegs) {
  const t = segIndex / (totalSegs - 1); // 0 = bottom, 1 = top
  if (t < 0.1) return '#e03030';       // red
  if (t < 0.25) return '#e07020';      // orange
  return '#30c040';                     // green
}

function makeAnalyser(ctx) {
  const a = ctx.createAnalyser();
  a.fftSize = 1024;
  a.minDecibels = -90;
  a.maxDecibels = -10;
  a.smoothingTimeConstant = 0.5;
  return a;
}

function drawBars() {
  animFrameId = requestAnimationFrame(drawBars);

  const w = canvas.width;
  const h = canvas.height;
  canvasCtx.fillStyle = '#111';
  canvasCtx.fillRect(0, 0, w, h);

  if (!analyser) return;

  const freqData = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(freqData);

  const barWidth = Math.floor(w / BAR_COUNT);
  const gap = 2 * devicePixelRatio;
  const innerBarW = barWidth - gap;
  const segH = Math.floor(h / SEG_COUNT);
  const segGap = SEG_GAP * devicePixelRatio;
  const innerSegH = segH - segGap;

  // Use only the lower half of the spectrum (most relevant for speech)
  const usableBins = Math.floor(freqData.length / 2);
  const binsPerBar = Math.max(1, Math.floor(usableBins / BAR_COUNT));

  for (let i = 0; i < BAR_COUNT; i++) {
    // Peak (not average) of the frequency bins for this bar — more visible
    let peak = 0;
    const startBin = i * binsPerBar;
    for (let b = 0; b < binsPerBar; b++) {
      peak = Math.max(peak, freqData[startBin + b]);
    }
    const litSegs = Math.round((peak / 255) * SEG_COUNT);

    const x = i * barWidth + gap / 2;

    for (let s = 0; s < litSegs; s++) {
      const y = h - (s + 1) * segH + segGap / 2;
      canvasCtx.fillStyle = segmentColor(s, SEG_COUNT);
      canvasCtx.fillRect(x, y, innerBarW, innerSegH);
    }

    // Draw dim segments above the lit ones
    for (let s = litSegs; s < SEG_COUNT; s++) {
      const y = h - (s + 1) * segH + segGap / 2;
      canvasCtx.fillStyle = '#191919';
      canvasCtx.fillRect(x, y, innerBarW, innerSegH);
    }
  }
}

function startVisualizer() {
  if (animFrameId) cancelAnimationFrame(animFrameId);
  drawBars();
}

function stopVisualizer() {
  // The analyser naturally returns zeros when no audio is playing
}

// ---- Worker setup ----
let worker = null;
let currentEngine = engineSelect.value;

let sampleRate = 24000;
let audioCtx = null;
let nextStartTime = 0;
let startTime = 0;
let firstChunkTime = null;
let allChunks = [];
let generating = false;
let replayAudioCtx = null;
let replaySource = null;
let cpuFeatures = {};

function createWorker() {
  currentEngine = engineSelect.value;
  const engine = ENGINE_INFO[currentEngine];
  worker = new Worker(engine.worker, { type: engine.type || 'module' });
  worker.onmessage = handleWorkerMessage;
  worker.onerror = (event) => {
    const detail = event.message || 'Worker failed to start';
    log(`Error: ${currentEngine} worker failed to start: ${detail}`);
    loadBtn.disabled = false;
    engineSelect.disabled = false;
    quantSelect.disabled = currentEngine !== 'xn';
  };
  worker.onmessageerror = () => {
    log(`Error: ${currentEngine} worker sent an unreadable message.`);
    loadBtn.disabled = false;
    engineSelect.disabled = false;
    quantSelect.disabled = currentEngine !== 'xn';
  };
}

function resetWorkerForEngine() {
  if (worker) worker.terminate();
  worker = null;
  const selectedEngine = engineSelect.value;
  sampleRate = 24000;
  cpuFeatures = {};
  allChunks = [];
  generating = false;
  engineSelect.disabled = false;
  loadBtn.disabled = false;
  loadBtn.style.display = '';
  btn.style.display = 'none';
  quantSelect.disabled = selectedEngine !== 'xn';
  quantSelect.parentElement.style.display = selectedEngine === 'xn' ? '' : 'none';
  languageSection.style.display = selectedEngine === 'supertonic' ? '' : 'none';
  stepsSection.style.display = selectedEngine === 'supertonic' ? '' : 'none';
  hideProgress();
  log('Select an engine and load weights.');
  createWorker();
}

function formatFeatures(f) {
  // Show every flag with a clear on/off marker. Wasm builds normally
  // only enable simd128, but listing avx/neon/f16c too makes it obvious
  // when one of them is actually active (e.g. in a native re-build).
  const flags = ['avx', 'neon', 'simd128', 'f16c'];
  return 'CPU features: ' + flags.map(k => `${k}=${f[k] ? 'on' : 'off'}`).join(' ');
}

function handleWorkerMessage(e) {
  const raw = e.data || {};
  if (raw.status) {
    handleSupertonicMessage(raw);
    return;
  }

  const { type, ...data } = raw;

  switch (type) {
    case 'status':
      log(data.message);
      break;

    case 'progress':
      if (data.pct >= 0) {
        log(`${data.label}: ${data.pct}% (${data.detail})`);
        showProgress(data.pct);
      } else {
        log(`${data.label}: ${data.detail}`);
      }
      break;

    case 'progress_done':
      hideProgress();
      break;

    case 'cache_cleared':
      clearCacheBtn.disabled = false;
      log(data.message);
      break;

    case 'loaded':
      sampleRate = data.sampleRate;
      cpuFeatures = data.features || {};
      engineSelect.disabled = false;
      quantSelect.disabled = currentEngine !== 'xn';
      loadBtn.style.display = 'none';
      btn.style.display = '';
      {
        const engineLine = data.engineLabel ? `Engine: ${data.engineLabel}\n` : '';
        const featuresLine = Object.keys(cpuFeatures).length ? `\n${formatFeatures(cpuFeatures)}` : '';
        log(`Ready! Enter text and click Generate.\n${engineLine}Embeddings: ${data.voiceSet}${featuresLine}`);
      }
      break;

    case 'gen_start':
      log(`Generating speech (${data.numTokens} tokens)...`);
      break;

    case 'chunk': {
      const chunk = new Float32Array(data.data);
      if (!firstChunkTime) {
        firstChunkTime = performance.now() - startTime;
        nextStartTime = audioCtx.currentTime;
      }

      nextStartTime = Math.max(nextStartTime, audioCtx.currentTime);

      const buf = audioCtx.createBuffer(1, chunk.length, sampleRate);
      buf.getChannelData(0).set(chunk);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      src.connect(analyser);
      src.start(nextStartTime);
      nextStartTime += chunk.length / sampleRate;

      allChunks.push(chunk);
      break;
    }

    case 'done': {
      const totalMs = performance.now() - startTime;
      const totalTime = (totalMs / 1000).toFixed(2);
      const totalSamples = allChunks.reduce((sum, c) => sum + c.length, 0);
      const durationSec = totalSamples / sampleRate;
      const duration = durationSec.toFixed(2);
      const firstAudio = firstChunkTime != null ? (firstChunkTime / 1000).toFixed(2) : '?';
      const rtf = totalMs > 0 ? (durationSec / (totalMs / 1000)).toFixed(3) : '?';
      const promptMs = data.promptMs != null ? data.promptMs.toFixed(0) : '?';
      const avgMs = data.stepMsAvg != null ? data.stepMsAvg.toFixed(1) : '?';
      const minMs = data.stepMsMin != null ? data.stepMsMin.toFixed(1) : '?';
      const maxMs = data.stepMsMax != null ? data.stepMsMax.toFixed(1) : '?';
      const stats = [
        `Generated ${duration}s of audio in ${totalTime}s (RTF=${rtf}, first audio: ${firstAudio}s)`,
        `Text prompt: ${promptMs}ms`,
        `Decode steps: ${data.numSteps ?? 0}, avg ${avgMs}ms (min ${minMs}, max ${maxMs})`,
        formatFeatures(cpuFeatures),
      ].join('\n');
      log(stats);

      // Create WAV download/replay element
      const allPcm = concatenateChunks(allChunks);
      const wavBlob = encodeWav(allPcm, sampleRate);
      const url = URL.createObjectURL(wavBlob);
      const container = document.getElementById('audio-container');
      container.innerHTML = '';
      const audio = document.createElement('audio');
      audio.controls = true;
      audio.src = url;
      container.appendChild(audio);
      hookAudioElement(audio);

      btn.disabled = false;
      generating = false;
      break;
    }

    case 'error':
      log('Error: ' + data.message);
      console.error(data.message);
      btn.disabled = false;
      engineSelect.disabled = false;
      quantSelect.disabled = currentEngine !== 'xn';
      clearCacheBtn.disabled = false;
      generating = false;
      break;
  }
}

function handleSupertonicMessage(data) {
  switch (data.status) {
    case 'ready':
      clearCacheBtn.disabled = false;
      if (!generating) log('Supertonic worker ready.');
      break;
    case 'progress':
      log(data.message || 'Loading Supertonic...');
      break;
    case 'loaded':
      sampleRate = data.sampleRate || 24000;
      engineSelect.disabled = false;
      quantSelect.disabled = true;
      loadBtn.style.display = 'none';
      btn.style.display = '';
      log(`Ready! Enter text and click Generate.\nEngine: Supertonic 3 ORT (${data.backend?.toUpperCase() || 'WASM'})\nLanguage: ${languageSelect.options[languageSelect.selectedIndex].text}\nSteps: ${stepsSelect.value}`);
      break;
    case 'complete': {
      const totalMs = performance.now() - startTime;
      log(`Generated Supertonic audio in ${(totalMs / 1000).toFixed(2)}s.`);
      const container = document.getElementById('audio-container');
      container.innerHTML = '';
      const audio = document.createElement('audio');
      audio.controls = true;
      audio.src = URL.createObjectURL(data.audio);
      container.appendChild(audio);
      hookAudioElement(audio);
      btn.disabled = false;
      generating = false;
      break;
    }
    case 'cached':
      log('Supertonic model cached.');
      break;
    case 'canceled':
      log('Supertonic generation canceled.');
      btn.disabled = false;
      generating = false;
      break;
    case 'error':
      log('Error: ' + (data.error || 'Supertonic failed'));
      btn.disabled = false;
      engineSelect.disabled = false;
      quantSelect.disabled = true;
      clearCacheBtn.disabled = false;
      generating = false;
      break;
  }
}

function hookAudioElement(audio) {
  // Set up the audio graph eagerly so it's ready when the user hits play
  replayAudioCtx = new AudioContext({ sampleRate });
  const replayAnalyser = makeAnalyser(replayAudioCtx);
  replaySource = replayAudioCtx.createMediaElementSource(audio);
  replaySource.connect(replayAnalyser);
  replayAnalyser.connect(replayAudioCtx.destination);

  audio.addEventListener('play', () => {
    if (replayAudioCtx.state === 'suspended') replayAudioCtx.resume();
    analyser = replayAnalyser;
    startVisualizer();
  });
}

function concatenateChunks(chunks) {
  const totalLength = chunks.reduce((sum, c) => sum + c.length, 0);
  const result = new Float32Array(totalLength);
  let offset = 0;
  for (const chunk of chunks) {
    result.set(chunk, offset);
    offset += chunk.length;
  }
  return result;
}

function loadWeights() {
  if (!worker) createWorker();
  loadBtn.disabled = true;
  engineSelect.disabled = true;
  quantSelect.disabled = true;
  if (currentEngine === 'supertonic') {
    worker.postMessage({
      command: 'load',
      backend: 'wasm',
      voice: voiceSelect.value,
      lang: languageSelect.value,
    });
  } else {
    worker.postMessage({
      type: 'load',
      voiceName: voiceSelect.value,
      quant: quantSelect.value,
    });
  }
}

function clearCache() {
  clearCacheBtn.disabled = true;
  if (currentEngine === 'supertonic') {
    worker.postMessage({ command: 'clear-cache' });
  } else {
    worker.postMessage({ type: 'clear_cache' });
  }
}

function generate() {
  const text = document.getElementById('text').value.trim();
  if (!text || generating) return;

  generating = true;
  btn.disabled = true;
  startTime = performance.now();
  firstChunkTime = null;
  allChunks = [];

  // Reset replay state since we're creating a new AudioContext
  replayAudioCtx = null;
  replaySource = null;

  // AudioContext must be created/resumed from a user gesture
  audioCtx = new AudioContext({ sampleRate });
  analyser = makeAnalyser(audioCtx);
  analyser.connect(audioCtx.destination);
  startVisualizer();

  if (currentEngine === 'supertonic') {
    worker.postMessage({
      command: 'tts',
      text,
      voice: voiceSelect.value,
      lang: languageSelect.value,
      backend: 'wasm',
      steps: Number(stepsSelect.value),
      speed: 1.1,
      requestId: `${Date.now()}`,
    });
  } else {
    worker.postMessage({
      type: 'generate',
      text,
      voiceName: voiceSelect.value,
      temperature: parseFloat(tempSlider.value),
    });
  }
}

function encodeWav(samples, sampleRate) {
  const numChannels = 1;
  const bitsPerSample = 16;
  const byteRate = sampleRate * numChannels * bitsPerSample / 8;
  const blockAlign = numChannels * bitsPerSample / 8;
  const dataSize = samples.length * blockAlign;
  const buffer = new ArrayBuffer(44 + dataSize);
  const view = new DataView(buffer);

  function writeString(offset, str) {
    for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
  }

  writeString(0, 'RIFF');
  view.setUint32(4, 36 + dataSize, true);
  writeString(8, 'WAVE');
  writeString(12, 'fmt ');
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true); // PCM
  view.setUint16(22, numChannels, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, byteRate, true);
  view.setUint16(32, blockAlign, true);
  view.setUint16(34, bitsPerSample, true);
  writeString(36, 'data');
  view.setUint32(40, dataSize, true);

  let offset = 44;
  for (let i = 0; i < samples.length; i++) {
    let s = Math.max(-1, Math.min(1, samples[i]));
    s = s < 0 ? s * 0x8000 : s * 0x7FFF;
    view.setInt16(offset, s, true);
    offset += 2;
  }

  return new Blob([buffer], { type: 'audio/wav' });
}

loadBtn.addEventListener('click', loadWeights);
clearCacheBtn.addEventListener('click', clearCache);
btn.addEventListener('click', generate);

updateVoiceOptions();
resetWorkerForEngine();

// Start the render loop (draws empty bars until audio plays)
startVisualizer();
</script>
